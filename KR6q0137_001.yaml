body:
  text: 出塵離俗圓頂方袍大率經歷叢林切要洞明規矩舉措未諳法度動止不合律儀雖是善友良朋詎肯深錐痛劄循襲成弊改革固難致令叢席荒凉轉使人心懈怠屢見尋常目前過患遂集百丈見成楷模原始要終從朝至暮要免頭頭敗闕直須一一遵行然後敢言究己明心了生達死世間法即是出世間法行腳人可貽未行腳人庶幾不負出家身心亦抑同報佛祖恩德謹具于后入衆之法睡不在人前起不落人後須是五更鐘未鳴輕輕擡身先起將枕子安腳下未用摺恐響驚鄰單抖擻精神將被裹身端坐不得扇風令人動念覺得困來却將被推腳下轉身將手巾下床手巾搭左手想念偈云從朝寅旦直至暮一切衆生自回互若於腳下喪身形願汝即時生淨土輕手揭簾出後架不得拖鞋不得咳嗽作聲古云揭簾須垂後手出堂切忌拖鞋輕手取桶洗面水不宜多使齒藥時右手點一次揩左邊左手點一次揩右邊不得兩手再蘸恐有牙宣口氣過人嗽口吐水時須低頭以手引下不得直腰吐水濺鄰桶不得洗頭有四件自他不利一污桶二污手巾是他人不利三枯髮四損眼是自己不利不得鼻孔內作聲不得高聲嘔吐古云五更洗面本為修行嘔吐拖盆喧堂聒衆拭面歸堂若在上間左腳先入若在下間右腳先入歸被位將眠單收一半坐定若換直裰須將新者先覆身上不得露白不得扇風燒香禮拜宜於鐘未鳴時披袈裟先合掌頂戴念偈云善哉解脫服無相福田衣我今頂戴受世世常得披摺袈裟先摺搭手處後解環不得以口𠼫袈裟不得以頷勾袈裟摺了亦當問訊而去如堂殿禮拜不得占中央妨住持人來不得出聲念佛不得行人頭邊過須行後面空處五更鐘鳴住持并首座坐堂不得從前門出入開小靜方摺被拗枕子摺被之法先尋兩角以手理伸向前面先摺一半次摺身前一半不得橫占鄰單處所不得抖擻作聲不得以被扇風或歸衆寮喫湯藥或茶堂經行次第歸鉢位以上肩順轉不得背入上肩乃左肩也若前門從南頰入不得行北頰并中央蓋尊住持人也木魚響不得入堂或令行者取鉢堂外坐或歸衆寮入堂歸鉢位低躬問訊上中下座若已先坐上中下座來須合掌古云不敬上中下座婆羅門聚會無殊聞長板鳴下鉢擡身正起立定然後轉身亦要須上肩合掌取鉢一手托鉢一手解鈎左手提轉身令正蹲身放鉢免將腰背撞人堂前鐘鳴下床問訊但是迎住持人不須將手左右搖拽下床時須近前問訊莫令袈裟搭床弦上仍須低細上床不得頓身取鉢安坐前聞槌聲合掌想念偈云佛生迦毗羅成道摩竭陀說法波羅奈入滅俱絺羅展鉢之法先合掌想念偈如來應量器我今得敷展願共一切衆等三輪空寂然後解復帕展淨巾覆膝帕子摺轉三角向下莫令出單外先展鉢單仰左手取鉢安單上以兩手頭指拼取鐼子從小次第展之不得敲磕作聲仍護第四指第五指為觸指不得用鉢拭摺令小并匙筯袋近身橫放入則先匙出則先筯手把處為淨頭向上肩鉢刷安第二鐼縫中出半寸許盛生飯不得以匙筯出生飯不過七粒太少為慳食維那念佛時合掌手指不得參差須當𮌎高低得所不得以手托口邊古云參差合掌不當𮌎十指交加插鼻中拖履揭簾無款細嘔聲泄氣逞英雄兩手捧鉢受食想念偈云若受食時當願衆生禪悅為食法喜充滿或多或少即以右手起止之聞遍食槌看上下肩以面相朝挹食不得正面以手搖兩邊挹罷作五觀想云一計工多少量彼來處二忖己德行全缺應供三防心離過貪等為宗四正似良藥為療形枯五為成道業應受此食出生偈云汝等鬼神衆我今施汝供此食遍十方一切鬼神共喫食之法將食就口不得將口就食取鉢放鉢并匙筯不得有聲不得咳嗽不得搐鼻涕若噴嚏當以衣袖掩鼻不得抓頭恐風屑落鄰鉢中不得以手挑牙不得嚼食啜羮作聲不得鉢中央挑飯不得大團食不得張口待食不得遺落飯食不得手把散飯食如有菜滓安鉢後屏處不得以風扇鄰位如自己怕風即白維那於堂外坐不得以手枕膝上隨量受食不得請折不得將頭鉢盛濕食不得將羮汁頭鉢內淘飯不得挑菜頭鉢內和飯喫食時須看上下不得太緩未再請不得刷鉢盂不得吮鉢刷作聲食未至不得生煩惱古云呆呆內顧起悲嗔念食吞津咳嗽頻漉粥啜羮包滿口開單展鉢響諸鄰洗鉢以頭鉢盛水次第洗鐼子不得於頭鉢內洗匙筯并鐼子仍屈第四第五指不得灌漱作聲不得吐水鉢中不得先盛熟水洗鉢未折水不得先收蓋膝巾不得以膝巾拭汗不煎以餘水瀝地上想念折水偈我此洗鉢水如天甘露味施汝諸鬼衆悉令得飽滿唵摩休羅細娑訶收鉢以兩手頭指拼定次第而入復畢合掌想念食畢偈云飯食訖已色力充威震十方三世雄回因轉果不在念一切衆生獲神通寮前板鳴歸寮問訊不歸謂輕侮大衆入門歸位如僧堂中法立定候寮主燒香畢問訊上下若有茶就坐不得垂衣不得聚頭語笑不得隻手挹人不得包藏茶末古云登床宴坐不可垂衣隻手挹人是何道理私藏茶末取笑傍觀時中鄰案道人切忌交頭接耳茶罷或看經不得長展經謂二面也不得手把經寮中行不得垂經帶不得出聲不得背靠板頭看經古云出聲持誦吵噪稠人靠背板頭輕欺大衆預先出寮莫待打坐禪板若抽脫古例被五條以淨巾搭左手解絛繫笐竿上脫挂子直裰令齊整以手巾繫定仍懸手巾尺許作記認不得語笑不得在外催促右手提水入廁換鞋不得參差安淨桶在前鳴指三下警噉糞鬼蹲身須正不得努氣作聲不得涕唾不得隔壁共人語話古云戶扄只合輕彈指人擁那堪亂作聲入處用籌分觸淨出時須水忌縱橫不得以水澆兩邊左手洗淨護大指第二指第三指不得多使籌子古云浴湯少使籌子休拈有者使了以水洗之安側邊空處人多妨衆不宜長久淨桶安舊處以乾手安內衣入袴古以乾手開門以右手提桶出不得以濕手拏門扇并門頰上右手挑灰後挑土不得以濕手拏灰土不得吐唾和泥土洗手然後用皂角洗至肘前須一一念入廁真言用水盟漱律中小遺亦洗淨仍嚼楊枝歸堂坐禪火板未鳴不得先歸寮齊前不得洗衣粥前齊前放參後不得開函匱如有急切白主事人寮中白寮主堂中白聖僧侍者齊罷僧堂內不得聚頭說話不得在僧堂內看經看冊子不得上下間行道不得穿堂直過不得席上穿錢不得床前垂腳坐床前一尺為三淨地一展鉢二安袈裟三頭所向不得床上行不得跪膝開函匱不得腳踏床緣下地草履五條游山不得經行佛殿法堂古云衩衣登殿草履游山莫踐法堂回互耆宿不得赤腳著僧鞋不得把手共行說世諦是非古云別了雙親棄本師訪尋知識擬何為不曾說著宗門事白首無成過在誰不得殿前倚靠襴干不得猖狂急走古云行須緩步習馬勝之威儀語要低聲學波離之軌範不得佛殿間行古云無事不須登寶殿等間莫向塔中行不因掃地添香水縱有河沙福也傾齊後漿洗衣服不得衩袒不得傾湯瓶泡衣竹竿尉斗使了安元處洗腳板響不得爭奪腳桶有瘡疥即隨後泡洗或將桶於屏處洗免衆動念莫待打坐堂板次第歸堂坐禪放參以眠單半展寮前板響即時轉身向外須當及時赴衆小板鳴不得入堂不得於堂外立住持首座出堂開單下床問訊歸寮藥石各就案位不得先起盛食不得高聲呼索粥飯鹽醋之類食罷出寮不得出三門不得入小寮不得衩衣歸僧堂并廊下行不得候打板出寮昏鐘鳴即合掌念偈云聞鐘聲煩惱輕智慧長菩提生離地獄出火坑願成佛度衆生須先歸單位坐禪不得床上抓頭不得床上弄數珠作聲不得與鄰單床上語話鄰單生疏當以善言誘諭不得生嫌惡心未打定鐘不得於前門出入首座枕不若響火鈴過時方許開燒香禮拜須待更深衆人未睡不得先睡衆人未起須當先起起坐不得驚動鄰單睡須右脅不得仰臥仰為尸睡覆為淫睡多惡夢以被巾裹袈裟安枕前今人多安腳下於理不便如遇入浴浴具携右手入下間門閫內問訊歸空處挹左右人畢先以五條手巾掛笐竿上展浴復取出浴具放一邊解上衣不可便卸却直裰先脫下面衣裳以腳巾圍身繫浴裙將裩袴捲𢯮安復內次脫直裰五條作一處將手巾繫於竿上無手巾以絛繫古云三通浴鼓入堂時觸淨須分上下衣却脫其餘衣服作一復覆轉放不得赤腳趍浴須著屐子於下間空處舀水不得占頭首老宿坐處謂上間也不得以湯水濺人身上不得將桶地上泡腳不得浴室內小遺并洗僻處不得將腳閣桶上不得語笑不得槽上揩腳不得戽水不得起身掇桶澆身恐水濺左右前後人須當遮護渾身不得多用浴湯腳巾不得離身有腳巾不入桶者或有瘡或洗灸瘡或使疥藥宜隨後入浴不得以兩邊公界手巾拭頭面浴室手巾係著衣後淨手披挂子出浴挹左右先著上分衣并直裰都遮即著下分衣解浴裙以腳巾展裙內恐濕浴復手巾携左手不得以濕腳巾搭手上揖左右出看設浴施主名字隨意課誦經呪回向寒月向火先坐爐上然後轉身入爐問訊方坐有虔脫鞋在外不得弄香匙火筯不得撥火不得聚頭說話不得煨點心等物不得炙鞋臭焙腳絣衣裳等皆不許不得攬起直裰露袴口不得吐唾并彈垢膩於火爐中如前所集一日事件衆中威儀非敢聞於老成聊以誘於初學升堂入室小參諷經念誦巡寮解結人事裝包頂笠送亡唱衣應係微細軌則清規既已具載尊宿各有明文不再備陳徒為贅語己巳嘉定二年佛生日集千龜峯首座寮比丘宗壽謹識終
